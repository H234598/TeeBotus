name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install package and pinned Python adapter deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,llm,rag,agents,tools]"
          python -m pip install -r requirements.txt
          python scripts/install_adapter_deps.py --python-only --no-user
      - name: Verify entrypoints and adapter lock dry-run
        run: |
          python -m TeeBotus --version
          python scripts/install_adapter_deps.py --dry-run --python-only --no-user
      - name: Run tests
        run: python -m pytest -q

  benchmark-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install benchmark deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,llm,rag,agents,tools]"
          python -m pip install -r requirements.txt
          python scripts/install_adapter_deps.py --python-only --no-user
      - name: Run deterministic benchmark suite
        run: |
          mkdir -p reports
          python -m pytest -q tests/test_benchmarks_runner.py
          python scripts/run_benchmarks.py --quick --entries 2 --iterations 1 --output reports/teebotus-benchmarks.md --json-output reports/teebotus-benchmarks.json
      - uses: actions/upload-artifact@v4
        with:
          name: teebotus-benchmarks
          path: reports/teebotus-benchmarks.*

  plan2-acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install all Plan2 extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,llm,rag,agents,tools]"
          python -m pip install -r requirements.txt
          python scripts/install_adapter_deps.py --python-only --no-user
      - name: Run non-live Plan2 acceptance
        run: |
          mkdir -p reports
          python scripts/check_plan2_acceptance.py \
            --skip-runtime-status \
            --adapter-deps-python-only \
            --entries 1 \
            --iterations 1 \
            --benchmark-output reports/teebotus-plan2-benchmarks.md \
            --benchmark-json-output reports/teebotus-plan2-benchmarks.json
      - uses: actions/upload-artifact@v4
        with:
          name: teebotus-plan2-acceptance
          path: reports/teebotus-plan2-benchmarks.*

  audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Dependency audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,llm]"
          python -m pip install -r requirements.txt
          pip-audit
